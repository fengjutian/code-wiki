[permissions]
allow = [
  "Read",
  "Write",
  "Edit",
  "Glob",
  "Grep",
  "WebFetch",
  "Bash(cd *:* && git *)",
  "Bash(cd *:* && python*)",
  "Bash(cd *:* && npx *)",
  "Bash(cd *:* && node *)",
  "Bash(cd *:* && cat *)",
  "Bash(cd *:* && ls *)",
  "Bash(cd *:* && test *)",
  "Bash(cd *:* && curl *)",
  "Bash(cd *:* && pip *)",
  "Bash(cd *:* && pwd *)",
  "Bash(cd *:* && grep *)",
  "Bash(cd *:* && mkdir *)",
  "Bash(dir *:* 2>*)",
  "Bash(where *)",
  "Bash(ls *)",
  "Bash(glob *)",
]
